<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Logistic Plus</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Cpath d='M8 11h16v10H8z' fill='white'/%3E%3Cpath d='M11 8h10v4H11zM10 22h3v3h-3zM19 22h3v3h-3z' fill='white'/%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background: #020617; }
        .splash-screen {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #020617;
          z-index: 9999;
          font-family: 'Tahoma', 'Arial', system-ui, -apple-system, sans-serif;
          color: white;
        }
        .loader-container {
          position: relative;
          width: 80px;
          height: 80px;
        }
        .loader-circle {
          position: absolute;
          width: 100%;
          height: 100%;
          border: 4px solid rgba(56, 189, 248, 0.1);
          border-top-color: #38bdf8;
          border-radius: 50%;
          animation: spin 1s infinite cubic-bezier(0.5, 0, 0.5, 1);
        }
        .loader-inner {
          position: absolute;
          inset: 20px;
          background: #38bdf8;
          border-radius: 50%;
          animation: pulse 2s infinite ease-in-out;
          box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .logo-text {
          margin-top: 24px;
          font-size: 1.5rem;
          font-weight: 900;
          letter-spacing: -0.025em;
          opacity: 0;
          animation: fadeIn 0.5s forwards 0.2s;
        }
        .sub-text {
          margin-top: 8px;
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.2em;
          color: #64748b;
          opacity: 0;
          animation: fadeIn 0.5s forwards 0.4s;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 
          0%, 100% { transform: scale(0.8); opacity: 0.5; }
          50% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      </style>
      <div class="splash-screen">
        <div class="loader-container">
          <div class="loader-circle"></div>
          <div class="loader-inner"></div>
        </div>
        <div class="logo-text">لجستیک پلاس</div>
        <div class="sub-text">LOGISTIC PLUS</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
